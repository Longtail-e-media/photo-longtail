        /* Responsive design for tablets */
        @media (max-width: 768px) {
            .grid-item {
                width: 48.2%; /* 2 columns */
            }
        }

        /* Responsive design for mobile phones */
        @media (max-width: 480px) {
            .grid-item {
                width: 100%; /* Single column for small screens */
            }
        }

        /* ── LightGallery: push lg-outer left when sidebar is open ─────────── */
        .lg-container.lg-with-sidebar .lg-outer {
            width: calc(100% - 320px);
            transition: width 0.3s ease;
        }
        .lg-outer {
            transition: width 0.3s ease;
        }

        /* ── Toolbar info button — matches LG's own .lg-icon style ─────────── */
        #lg-info-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        #lg-info-btn.lg-info-active {
            color: #fff;
            opacity: 1 !important;
        }
        #lg-info-btn.hidden { display: none !important; }

        /* ── Info sidebar ───────────────────────────────────────────────────── */
        #lg-info-panel {
            position: fixed;
            top: 0;
            right: 0;
            width: 320px;
            height: 100%;
            background: #1a1a1a;
            color: #e0e0e0;
            z-index: 10001;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            border-left: 1px solid rgba(255,255,255,0.08);
        }
        #lg-info-panel.lg-panel-open {
            transform: translateX(0);
        }

        /* Scrollable content area */
        #lg-info-content {
            flex: 1;
            overflow-y: auto;
            padding: 28px 22px;
            scrollbar-width: thin;
            scrollbar-color: #444 transparent;
        }
        #lg-info-content::-webkit-scrollbar { width: 4px; }
        #lg-info-content::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        #lg-info-gallery-title {
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #777;
            margin-bottom: 12px;
        }
        #lg-info-desc {
            font-size: 14px;
            line-height: 1.8;
            color: #bbb;
        }
        #lg-info-desc p  { margin-bottom: 12px; }
        #lg-info-desc p:last-child { margin-bottom: 0; }
        #lg-info-desc a  { color: #999; text-decoration: underline; }

        /* View gallery link at the bottom */
        #lg-info-footer {
            padding: 16px 22px;
            border-top: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }
        #lg-info-footer a {
            display: block;
            text-align: center;
            color: #aaa;
            font-size: 12px;
            text-decoration: none;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: color 0.2s;
        }
        #lg-info-footer a:hover { color: #fff; }

        /* ── Mobile: bottom drawer, no push ─────────────────────────────────── */
        @media (max-width: 768px) {
            /* Cancel the push on mobile — sidebar overlays instead */
            .lg-container.lg-with-sidebar .lg-outer {
                width: 100%;
            }

            #lg-info-panel {
                top: auto;
                bottom: 0;
                right: 0;
                left: 0;
                width: 100%;
                height: 50vh;
                max-height: 380px;
                transform: translateY(100%);
                border-radius: 14px 14px 0 0;
                border-left: none;
                border-top: 1px solid rgba(255,255,255,0.08);
                box-shadow: 0 -6px 24px rgba(0,0,0,0.6);
            }
            #lg-info-panel.lg-panel-open {
                transform: translateY(0);
            }
        }

<script>

    //   window.addEventListener('scroll', () => {

    //     } else {
    //       heading.style.visibility = 'hidden';
    //     }
    //   });
    const heading = document.getElementById('hide_on_scroll');

    function handleScrollAndResize() {
        const rect = heading.getBoundingClientRect();
        const isMobile = window.innerWidth <= 767;

        if (isMobile) {
            heading.style.display = 'none';
        } else {
            if (rect.top >= 100 && rect.bottom >= 0) {
                heading.style.visibility = 'visible';
                heading.style.display = 'block';
            } else {
                heading.style.visibility = 'hidden';
                heading.style.display = 'block';
            }
        }
    }

    window.addEventListener('scroll', handleScrollAndResize);
    window.addEventListener('resize', handleScrollAndResize);
    handleScrollAndResize();

</script>

<script>
    $(window).on('load', function () {

        var $grid = $('.grid').masonry({
            itemSelector: '.grid-item',
            percentPosition: true,
            columnWidth: '.grid-sizer'
        });
        // layout Masonry after each image loads
        $grid.imagesLoaded().progress(function () {
            $grid.masonry(layout);
        });
    })

    function triggerLightGallery(itemId) {
        const $element = $("#" + itemId);

        // Destroy any existing LightGallery instance
        if ($element.data('lightGallery')) {
            $element.data('lightGallery').destroy(true);
        }

        // Initialize LightGallery
        lightGallery($element[0], {
            selector: 'a',
        });
    }

    $(document).ready(function () {
        var base_url = $('base').attr('url');

        var $grid = $('#masonry-grid').masonry({
            itemSelector: '.grid-item',
            columnWidth: '.grid-item',
            percentPosition: true
        });

        // var htmlContent = ' <button id="loadMoreImages">Load more</button>'
        var pageCounter = 2;
        var isLoading = false;
        var allLoaded = false; // stops fetching once the server returns no data

        function loadMoreImages() {
            if (allLoaded) return;
            loadImages(pageCounter, function () {
                pageCounter++;
            });
        }

        function beforeLoading() {
            $('#loadMore').css('display', 'none');
            // $('.loading').css('display', 'block');
            $('#masonry__grid').css('display', 'block');
        }

        function afterLoading() {
            // $('#loadMore').css('display', 'block').html(htmlContent);
            $('.loading').css('display', 'none');
            $('#masonry__grid').css('display', 'none');
        }

// 1. Initialize LightGallery ONCE on the hidden preload container (all homepage images, server-rendered)
        const preloadElement = document.getElementById('lg-preload');
        let lgInstance = null;

        // ── Sidebar helpers ───────────────────────────────────────────────
        var baseUrl = $('base').attr('url') || '';
        var SIDEBAR_WIDTH = 320; // must match CSS #lg-info-panel width

        function getLgItems() {
            return document.querySelectorAll('#lg-preload a');
        }

        function getLgContainer() {
            return document.querySelector('.lg-container');
        }

        function toggleSidebar() {
            var panel     = document.getElementById('lg-info-panel');
            var btn       = document.getElementById('lg-info-btn');
            var container = getLgContainer();
            if (!panel || !container) return;

            var opening = !panel.classList.contains('lg-panel-open');
            panel.classList.toggle('lg-panel-open', opening);
            container.classList.toggle('lg-with-sidebar', opening);
            if (btn) btn.classList.toggle('lg-info-active', opening);

            // After CSS transition completes, tell LG the container resized
            // so it recenters/rescales the image for the new width
            setTimeout(function () {
                window.dispatchEvent(new Event('resize'));
            }, 310); // slightly over the 0.3s transition
        }

        function updateSidebar(index) {
            var items     = getLgItems();
            var panel     = document.getElementById('lg-info-panel');
            var btn       = document.getElementById('lg-info-btn');
            var container = getLgContainer();
            if (!panel || !items[index]) return;

            var item     = items[index];
            var galTitle = item.getAttribute('data-gallery-title') || '';
            var galDesc  = item.getAttribute('data-gallery-desc')  || '';
            var galSlug  = item.getAttribute('data-gallery-slug')  || '';
            var hasDesc  = galDesc.trim().length > 0;

            document.getElementById('lg-info-gallery-title').textContent = galTitle;
            document.getElementById('lg-info-desc').innerHTML = hasDesc ? galDesc : '';

            var footer = document.getElementById('lg-info-footer');
            if (galSlug) {
                footer.innerHTML = '<a href="' + baseUrl + 'portfolio/' + galSlug + '">View Full Property &rarr;</a>';
                footer.style.display = '';
            } else {
                footer.style.display = 'none';
            }

            if (hasDesc) {
                if (btn) btn.classList.remove('hidden');
                // Open sidebar if not already open
                if (!panel.classList.contains('lg-panel-open')) {
                    panel.classList.add('lg-panel-open');
                    if (btn) btn.classList.add('lg-info-active');
                    if (container) {
                        container.classList.add('lg-with-sidebar');
                        setTimeout(function () {
                            window.dispatchEvent(new Event('resize'));
                        }, 310);
                    }
                }
            } else {
                // No description — hide button, close panel, remove push
                if (btn) btn.classList.add('hidden');
                if (panel.classList.contains('lg-panel-open')) {
                    panel.classList.remove('lg-panel-open');
                    if (btn) btn.classList.remove('lg-info-active');
                    if (container) {
                        container.classList.remove('lg-with-sidebar');
                        setTimeout(function () {
                            window.dispatchEvent(new Event('resize'));
                        }, 310);
                    }
                }
            }
        }

        function injectSidebar() {
            // Remove any stale instance first
            var oldPanel = document.getElementById('lg-info-panel');
            if (oldPanel) oldPanel.parentNode.removeChild(oldPanel);
            var oldBtn = document.getElementById('lg-info-btn');
            if (oldBtn) oldBtn.parentNode.removeChild(oldBtn);

            // ── Sidebar panel ─────────────────────────────────────────────
            var panel = document.createElement('div');
            panel.id = 'lg-info-panel';
            panel.innerHTML =
                '<div id="lg-info-content">' +
                    '<div id="lg-info-gallery-title"></div>' +
                    '<div id="lg-info-desc"></div>' +
                '</div>' +
                '<div id="lg-info-footer" style="display:none"></div>';
            document.body.appendChild(panel);

            // ── Toolbar button — injected alongside LG's own close/maximize ──
            var toolbar = document.querySelector('.lg-toolbar');
            if (toolbar) {
                var btn = document.createElement('button');
                btn.type = 'button';
                btn.id = 'lg-info-btn';
                btn.className = 'lg-info-btn lg-icon hidden';
                btn.setAttribute('aria-label', 'Toggle info panel');
                btn.innerHTML =
                    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" ' +
                    'stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
                    '<polyline points="15 3 21 3 21 9"></polyline>' +
                    '<polyline points="9 21 3 21 3 15"></polyline>' +
                    '<line x1="21" y1="3" x2="14" y2="10"></line>' +
                    '<line x1="3" y1="21" x2="10" y2="14"></line>' +
                    '</svg>';
                // Insert as the first button in the toolbar (leftmost)
                toolbar.insertBefore(btn, toolbar.firstChild);
                btn.addEventListener('click', toggleSidebar);
            }

            // Populate for the opening slide — updateSidebar handles open/close state
            if (lgInstance) {
                updateSidebar(lgInstance.index);
            }
        }

        function removeSidebar() {
            // Close panel and clean up push class before removing
            var container = getLgContainer();
            if (container) container.classList.remove('lg-with-sidebar');

            var panel = document.getElementById('lg-info-panel');
            if (panel) panel.parentNode.removeChild(panel);

            var btn = document.getElementById('lg-info-btn');
            if (btn) btn.parentNode.removeChild(btn);
        }

        // ── Wire events BEFORE init so they fire on first open ────────────
        if (preloadElement) {
            preloadElement.addEventListener('lgAfterOpen', function () {
                injectSidebar();
            });

            preloadElement.addEventListener('lgAfterSlide', function (e) {
                updateSidebar(e.detail.index);
            });

            preloadElement.addEventListener('lgBeforeClose', function () {
                removeSidebar();
            });

            lgInstance = lightGallery(preloadElement, {
                selector: 'a',
                appendSourceTo: 'body'
            });
        }

        function loadImages(page = 1, onSuccess = () => {
        }) {
            if (isLoading || allLoaded) return;
            isLoading = true;

            $.ajax({
                url: base_url + 'ajax_images.php',
                data: {page: page},
                beforeSend: function () {
                    beforeLoading();
                },
                success: function (data) {
                    if ($.trim(data) === '') {
                        allLoaded = true;
                        isLoading = false;
                        afterLoading();
                        return;
                    }

                    var $items = $(data);
                    $items.imagesLoaded(function () {
                        $grid.append($items).masonry('appended', $items);
                        $grid.masonry('layout');

                        afterLoading();
                        isLoading = false;
                        onSuccess();
                    });
                },
                error: function () {
                    isLoading = false;
                    afterLoading();
                }
            });
        }

// Load initial images
        loadImages();

// 3. Intercept clicks on AJAX-loaded images and open the preloaded LightGallery at the correct index
        $(document).on('click', '.zoom-img', function (e) {
            e.preventDefault();
            if (!lgInstance || !preloadElement) return;

            var clickedHref = $(this).attr('href');
            var $lgItems = $('#lg-preload a');
            var index = -1;

            $lgItems.each(function (i) {
                if ($(this).attr('href') === clickedHref) {
                    index = i;
                    return false; // break
                }
            });

            if (index !== -1) {
                lgInstance.openGallery(index);
            } else {
                // Fallback: image not in preload set (edge case), open at 0
                lgInstance.openGallery(0);
            }
        });


        // Infinite scroll
        $(window).on('scroll', function () {
            if (allLoaded) return; // no more pages — skip scroll check entirely
            if ($(window).scrollTop() + $(window).height() >= $(document).height() - 100) {
                loadMoreImages();
            }
        });


    });

    /*$(document).on('click', '.gallery-image', function (e) {
        e.preventDefault();
        let ancestorId = $(this).closest('.zoom-img-container').attr('id');

        const $element = $("#" + ancestorId);

        lightGallery($element[0], {

        });

        // Initialize LightGallery after a short delay
        const firstImage = $element.find('a').first(); // Get the first image link
        if (firstImage.length) {
            firstImage[0].click(); // Trigger click on the first image to open the gallery
        }
    })*/
</script>
